name: Test cucumber

on:
  push:
    branches:
      - main
      - renovate/*
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 5 * * *"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ['3.2', '3.3', '3.4']
        include:
          - os: ubuntu-latest
            ruby: jruby-9.4
          - os: ubuntu-latest
            ruby: truffleruby
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: ./.github/actions/test-ruby
        with:
          ruby-version: ${{ matrix.ruby }}
